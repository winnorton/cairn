# .github/workflows/sync-guard.yml
# Shell dialect: POSIX (GitHub Actions ubuntu-latest runner)
#
# Runs the cairn skill guards across the source of truth and all distribution packages.
# Fails if any package's committed skill copies drift from files/skills/<name>/SKILL.md,
# if any description exceeds 1024 chars, if an instructional-body word count drifts
# from its reviewed baseline, if any frontmatter name mismatches, if package version !=
# VERSION, or if a skill carries machine-register bloat. [LAW prompt-economy]
# [LAW gate-beats-instruction] [MEM reference/prompt-economy]
#
# Also enforces:
#   - [LAW handoff-stays-current]: a change set that touches VERSION must touch
#     HANDOFF.md and HANDOFF.md must mention the new version (release-guard job).
#   - [LAW own-your-namespace]: no skill may take the name of a known vendor
#     built-in command (scripts/check-namespace.mjs).
#
# No path filters: every push/PR runs every gate. The checks cost seconds, and
# path-filtering was exactly how doc-only release PRs (HANDOFF/README/adopt.md)
# shipped drift with green CI.
#
# Gate: required status check on PRs to main per the program's §8 operational policy.

name: sync-guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Skill sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill description caps and body-word ratchets
        run: node scripts/check-skill-budgets.mjs

      - name: Check machine-register (prompt-economy gate, full source set)
        run: node scripts/check-prompt-register.mjs

      - name: Check skill names against vendor-builtin collisions
        run: node scripts/check-namespace.mjs

      - name: Check law-entry shape (slug + Why + How to apply)
        run: node scripts/check-laws-shape.mjs

      - name: Check cairn-pi skills in sync
        run: node scripts/sync-skills.mjs --pkg packages/cairn-pi --check

      - name: Check cairn-claude skills in sync
        run: node scripts/sync-skills.mjs --pkg packages/cairn-claude --check

      - name: Check cairn-agy skills in sync
        run: node scripts/sync-skills.mjs --pkg packages/cairn-agy --check

  release-guard:
    name: Release guard (VERSION ⇒ HANDOFF.md, per [LAW handoff-stays-current])
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: VERSION change requires HANDOFF.md update in the same change set
        run: |
          set -eu
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch origin "${GITHUB_BASE_REF}" >/dev/null 2>&1 || true
            RANGE="origin/${GITHUB_BASE_REF}...HEAD"
          else
            BEFORE="${GITHUB_EVENT_BEFORE:-}"
            case "$BEFORE" in
              ""|0000000000000000000000000000000000000000) RANGE="HEAD~1..HEAD" ;;
              *) RANGE="${BEFORE}..${GITHUB_SHA}" ;;
            esac
          fi
          CHANGED=$(git diff --name-only "$RANGE" 2>/dev/null || git diff --name-only HEAD~1..HEAD)
          if printf '%s\n' "$CHANGED" | grep -qx "VERSION"; then
            echo "VERSION changed — enforcing HANDOFF.md coupling per [LAW handoff-stays-current]"
            printf '%s\n' "$CHANGED" | grep -qx "HANDOFF.md" || {
              echo "FAIL: VERSION changed but HANDOFF.md did not."
              echo "[LAW handoff-stays-current]: bundle the HANDOFF.md update into the same change set as VERSION."
              exit 1
            }
            V=$(tr -d '[:space:]' < VERSION)
            grep -q "$V" HANDOFF.md || {
              echo "FAIL: HANDOFF.md does not mention version $V."
              exit 1
            }
            echo "OK: VERSION=$V and HANDOFF.md move together."
          else
            echo "VERSION unchanged — no coupling required."
          fi
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
